<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Illusive | Luxury Streetwear</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif}
body{background:#0e0e0e;color:#fff;overflow-x:hidden}

/* WATERMARK */
.watermark{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) rotate(-30deg);
font-size:8rem;
font-weight:800;
letter-spacing:10px;
color:rgba(255,255,255,0.03);
white-space:nowrap;
pointer-events:none;
z-index:0;
}

/* NAVBAR */
header{
position:fixed;
width:100%;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
z-index:1000;
border-bottom:1px solid #222;
}
.logo{
font-size:1.5rem;
font-weight:800;
background:linear-gradient(90deg,#ccc,#fff,#999);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
letter-spacing:2px;
}
nav a{
margin-left:30px;
text-decoration:none;
color:#ccc;
font-weight:500;
transition:.3s;
}
nav a:hover{color:#fff}
.cart{
background:#fff;
color:#000;
padding:8px 15px;
border-radius:20px;
font-weight:600;
cursor:pointer;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:url('https://images.unsplash.com/photo-1520975916090-3105956dac38') center/cover no-repeat;
position:relative;
}
.hero::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
top:0;left:0;
}
.hero-content{position:relative;z-index:1;}
.hero h1{font-size:4rem;font-weight:800;margin-bottom:20px;}
.hero button{padding:15px 40px;border:none;border-radius:30px;background:linear-gradient(90deg,#e6e6e6,#ffffff);color:#000;font-weight:600;cursor:pointer;transition:.3s;}
.hero button:hover{transform:scale(1.05)}

/* PRODUCTS */
.section{padding:100px 8%;}
.section h2{text-align:center;font-size:2.5rem;margin-bottom:50px;}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:40px;}
.card{background:#141414;border-radius:15px;overflow:hidden;transition:.4s;border:1px solid #222;cursor:pointer;}
.card:hover{transform:translateY(-10px);box-shadow:0 10px 30px rgba(255,255,255,0.1);}
.card img{width:100%;height:350px;object-fit:cover;}
.card-content{padding:20px;}
.card-content h3{margin-bottom:10px;}
.price{color:#bbb;margin-bottom:15px;}
.card-content button{width:100%;padding:12px;border:none;border-radius:8px;background:#fff;color:#000;font-weight:600;cursor:pointer;transition:.3s;}
.card-content button:hover{background:#ccc}

/* MODAL */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);justify-content:center;align-items:center;z-index:2000;}
.modal-content{background:#111;padding:30px;border-radius:15px;width:90%;max-width:500px;position:relative;text-align:center;}
.modal-content h3{margin-bottom:20px;font-size:2rem;}
.modal-content label{display:block;margin:10px 0 5px;text-align:left;}
.modal-content select,input{width:100%;padding:10px;margin-bottom:15px;border-radius:5px;border:none;}
.modal-content button{padding:12px 20px;border:none;border-radius:8px;background:#ff4d4d;color:#fff;font-weight:600;cursor:pointer;}
.close-btn{position:absolute;top:15px;right:15px;font-size:1.5rem;cursor:pointer;color:#fff;}

/* FOOTER */
footer{background:#000;padding:40px 8%;text-align:center;border-top:1px solid #222;}
@media(max-width:768px){.hero h1{font-size:2.5rem}}
</style>
</head>
<body>

<div class="watermark">ILLUSIVE</div>
<header>
<div class="logo">ILLUSIVE</div>
<nav>
<a href="#">Home</a>
<a href="#shop">Shop</a>
<a href="#">Lookbook</a>
<a href="#">Contact</a>
</nav>
<div class="cart" onclick="toggleCart()">Cart: <span id="cart-count">0</span></div>
</header>

<section class="hero">
<div class="hero-content">
<h1>Luxury Streetwear Redefined</h1>
<button onclick="document.getElementById('shop').scrollIntoView({behavior:'smooth'})">Shop Collection</button>
</div>
</section>

<section id="shop" class="section">
<h2>Featured Collection</h2>
<div class="products" id="product-list">
<!-- Products generated by JS -->
</div>
</section>

<!-- MODAL -->
<div class="modal" id="product-modal">
<div class="modal-content">
<span class="close-btn" onclick="closeModal()">&times;</span>
<h3 id="modal-name">Product Name</h3>
<p id="modal-price">P0</p>
<label for="size-select">Size:</label>
<select id="size-select">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>
<label for="qty-input">Quantity:</label>
<input type="number" id="qty-input" min="1" value="1">
<button onclick="addModalToCart()">Add to Cart</button>
</div>
</div>

<footer>
<p>© 2026 ILLUSIVE. All rights reserved.</p>
</footer>

<script>
let cart = [];
let currentProduct = null;

const products = [
  {name:'FEAR NO ART',price:299,img:'https://www.instagram.com/p/DVOwZb-DBQH/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=='},
  {name:'Signature Hoodie',price:599,img:'https://images.unsplash.com/photo-1503342217505-b0a15ec3261c'},
  {name:'Chrome Cap',price:199,img:'https://images.unsplash.com/photo-1528701800489-20be3c9f2a1d'}
];

function generateProducts(){
  const list = document.getElementById('product-list');
  products.forEach((p,i)=>{
    const card = document.createElement('div');
    card.className='card';
    card.innerHTML=`<img src='${p.img}'><div class='card-content'><h3>${p.name}</h3><div class='price'>P${p.price}</div></div>`;
    card.onclick = ()=>openModal(i);
    list.appendChild(card);
  });
}

function openModal(index){
  currentProduct = products[index];
  document.getElementById('modal-name').textContent=currentProduct.name;
  document.getElementById('modal-price').textContent='P'+currentProduct.price;
  document.getElementById('qty-input').value=1;
  document.getElementById('size-select').value='M';
  document.getElementById('product-modal').style.display='flex';
}

function closeModal(){
  document.getElementById('product-modal').style.display='none';
}

function addModalToCart(){
    const size = document.getElementById('size-select').value;
    const qty = parseInt(document.getElementById('qty-input').value);
    
    const order = {
        name: currentProduct.name,
        size: size,
        qty: qty,
        price: currentProduct.price,
        customer: 'Anonymous', // you can add a form later for name
        paymentMethod: 'PayPal',
        status: 'Pending'
    };
    
    // Save to cart for the front-end
    cart.push(order);
    updateCartCount();
    
    // Save to localStorage for dashboard
    let storedOrders = JSON.parse(localStorage.getItem('illusiveOrders')) || [];
    storedOrders.push(order);
    localStorage.setItem('illusiveOrders', JSON.stringify(storedOrders));
    
    closeModal();
}

function updateCartCount(){
  const count = cart.reduce((acc,i)=>acc+i.qty,0);
  document.getElementById('cart-count').textContent=count;
}

function toggleCart(){
  alert('Cart Items:\n'+cart.map(c=>`${c.name} (${c.size}) x${c.qty} - P${c.price*c.qty}`).join('\n')+'\n\nTotal: P'+cart.reduce((acc,i)=>acc+i.price*i.qty,0));
}

generateProducts();
</script>

</body>
</html>
