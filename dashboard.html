<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Illusive Seller Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif}
body{background:#0f0f0f;color:#fff;}
header{padding:20px 8%;background:#111;border-bottom:1px solid #222;display:flex;justify-content:space-between;align-items:center;}
header h1{font-size:2rem;letter-spacing:2px;}
.section{padding:60px 8%;}
h2{text-align:center;font-size:2rem;margin-bottom:40px;}
table{width:100%;border-collapse:collapse;}
th,td{padding:12px;text-align:left;border-bottom:1px solid #222;}
th{background:#1a1a1a;}
td{background:#141414;}
.status-select{padding:5px;border-radius:5px;border:none;}
.total-revenue{margin-top:20px;font-size:1.2rem;font-weight:600;text-align:right;}
</style>
</head>
<body>

<header>
<h1>Illusive Dashboard</h1>
</header>

<section class="section">
<h2>Orders</h2>
<table id="orders-table">
<thead>
<tr><th>Customer</th><th>Product</th><th>Size</th><th>Quantity</th><th>Price</th><th>Payment Method</th><th>Status</th></tr>
</thead>
<tbody>
<!-- Orders will populate here -->
</tbody>
</table>
<div class="total-revenue" id="total-revenue">Total Revenue: P0</div>
</section>

<script>
let orders = JSON.parse(localStorage.getItem('illusiveOrders')) || [];

// Sample function to simulate adding orders from front-end
function addOrder(order){
  orders.push(order);
  renderOrders();
}

function renderOrders(){
  const tbody = document.getElementById('orders-table').querySelector('tbody');
  tbody.innerHTML='';
  let total = 0;
  orders.forEach((o,i)=>{
    total += o.price * o.qty;
    const tr = document.createElement('tr');
    tr.innerHTML=`
      <td>${o.customer}</td>
      <td>${o.name}</td>
      <td>${o.size}</td>
      <td>${o.qty}</td>
      <td>P${o.price*o.qty}</td>
      <td>${o.paymentMethod}</td>
      <td>
        <select class='status-select' onchange='updateStatus(${i},this.value)'>
          <option ${o.status==='Pending'?'selected':''}>Pending</option>
          <option ${o.status==='Paid'?'selected':''}>Paid</option>
          <option ${o.status==='Shipped'?'selected':''}>Shipped</option>
          <option ${o.status==='Delivered'?'selected':''}>Delivered</option>
        </select>
      </td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('total-revenue').textContent='Total Revenue: P'+total;
}

function updateStatus(index,value){
  orders[index].status=value;
}

// Example orders for testing
addOrder({customer:'John Doe',name:'Illusive Tee',size:'M',qty:2,price:299,paymentMethod:'PayPal',status:'Pending'});
addOrder({customer:'Jane Smith',name:'Signature Hoodie',size:'L',qty:1,price:599,paymentMethod:'PayPal',status:'Pending'});
</script>

</body>
</html>
